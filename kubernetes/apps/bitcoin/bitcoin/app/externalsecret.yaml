---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bitcoin
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bitcoin-secret
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      data:
        # Monitoring credential for the sidecar exporter. Plaintext is
        # required for HTTP Basic auth on the client side. Admin credential
        # never materializes here — it's only referenced via the hashed
        # rpcauth line in bitcoin.conf below.
        MONITORING_RPC_USER: "{{ .MONITORING_RPC_USER }}"
        MONITORING_RPC_PASSWORD: "{{ .MONITORING_RPC_PASSWORD }}"
        bitcoin.conf: |
          server=1
          listen=0
          testnet=1
          prune=1000
          txindex=0
          listenonion=0
          rpcworkqueue=64
          # Two users with different trust levels:
          #   - `monitoring` → used by the sidecar exporter. Restricted via
          #     rpcwhitelist to the 13 methods the exporter actually calls.
          #   - `admin` → used by humans (curl / bitcoin-cli from the LAN).
          #     No whitelist → full access. Plaintext lives ONLY in 1Password,
          #     never materializes as a Kubernetes Secret.
          rpcauth={{ .MONITORING_RPCAUTH }}
          rpcauth={{ .ADMIN_RPCAUTH }}
          rpcwhitelist=monitoring:getblockchaininfo,getblockstats,getchaintips,getchaintxstats,getmemoryinfo,getmempoolinfo,getnettotals,getnetworkhashps,getnetworkinfo,getrpcinfo,estimatesmartfee,listbanned,uptime
          rpcwhitelistdefault=0
          # No rpcbind/rpcallowip: defaults (listen on localhost, accept only
          # from localhost) match the sidecar-only access model. bitcoind
          # is reached by the exporter via the pod's shared network namespace;
          # nothing else in the cluster needs to connect.
  dataFrom:
    - extract:
        key: bitcoin