---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bitcoin
spec:
  chartRef:
    kind: OCIRepository
    name: bitcoin
  # NOTE: openebs-hostpath binds PVs to a specific node. If this pod reschedules
  # to a different node it will be stuck Pending. Pin with nodeSelector /
  # nodeAffinity if availability matters more than losing the chainstate.
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      bitcoin:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          bitcoind:
            image:
              repository: ghcr.io/oscaromeu/bitcoind
              tag: 27.0@sha256:9bc6030a6a115489071e9ed88f40b5f49e2bf6da8eb969cc277f5f5c960fe0d4
            command: ["bitcoind"]
            args: ["-conf=/config/bitcoin.conf", "-datadir=/data"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            # Probes on bitcoind are disabled — the exporter's /metrics probe
            # already validates that RPC is reachable. Adding bitcoind-level
            # TCP probes on 18332 would be redundant.
            probes:
              liveness: { enabled: false }
              readiness: { enabled: false }
              startup: { enabled: false }
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 5Gi
          exporter:
            image:
              repository: jvstein/bitcoin-prometheus-exporter
              tag: v0.9.0@sha256:358132b6967554f4d30a43847bfc5fd941719eb257b2820cf8ebd16405733843
            env:
              BITCOIN_RPC_HOST: localhost
              BITCOIN_RPC_PORT: "18332"
              BITCOIN_RPC_USER:
                valueFrom:
                  secretKeyRef:
                    name: bitcoin-secret
                    key: MONITORING_RPC_USER
              BITCOIN_RPC_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: bitcoin-secret
                    key: MONITORING_RPC_PASSWORD
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            probes:
              liveness: &exporterProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: &metricsPort 9332
                  periodSeconds: 30
                  timeoutSeconds: 60
                  failureThreshold: 3
              readiness: *exporterProbe
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: bitcoin
        ports:
          metrics:
            port: *metricsPort
    serviceMonitor:
      app:
        serviceName: app
        endpoints:
          - port: metrics
            interval: 30s

    persistence:
      config:
        type: secret
        name: bitcoin-secret
        advancedMounts:
          bitcoin:
            bitcoind:
              - path: /config/bitcoin.conf
                subPath: bitcoin.conf
                readOnly: true
      data:
        existingClaim: bitcoin-data
        advancedMounts:
          bitcoin:
            bitcoind:
              - path: /data
      # With readOnlyRootFilesystem: true, bitcoind still needs a writable
      # /tmp for temporary compaction files. An in-memory emptyDir is plenty.
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
        advancedMounts:
          bitcoin:
            bitcoind:
              - path: /tmp
