---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse-operator
spec:
  chartRef:
    kind: OCIRepository
    name: clickhouse-operator
  values:
    manager:
      replicas: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi

    crd:
      enable: true
      keep: true

    certManager:
      enable: true
      install: false

    metrics:
      enable: true
      port: 8080

    webhook:
      enable: true
      port: 9443
