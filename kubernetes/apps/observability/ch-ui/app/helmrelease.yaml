---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ch-ui
spec:
  chartRef:
    kind: OCIRepository
    name: ch-ui
  values:
    controllers:
      ch-ui:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/caioricciuti/ch-ui
              tag: v2.6.1@sha256:b718d6667451db75e744d95e882aacd5096af2cfb37e17027fb92cffc754b7d8
            env:
              CLICKHOUSE_URL: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: 3488
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: openebs-hostpath
        globalMounts:
          - path: /app/data
    route:
      app:
        hostnames: ["ch-ui.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 3488
