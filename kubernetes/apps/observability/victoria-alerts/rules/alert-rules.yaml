groups:
  - name: HomeOps
    type: vlogs
    interval: 1m
    rules:
      - alert: HomeIPChanged
        expr: 'k_labels_k6_cr:"ip-logger" ip_change | unpack_logfmt | unpack_json from msg | filter event:"ip_change" | stats by (expected, actual) count() as cnt | filter cnt:>0'
        annotations:
          summary: "Home IP changed: {{ $labels.expected }} → {{ $labels.actual }}"
          description: "Detected {{ $labels.cnt }} IP mismatches in the last hour. Expected {{ $labels.expected }}, observed {{ $labels.actual }}. If legitimate, update the EXPECTED_IP value in kubernetes/apps/observability/k6s/scenarios/ip-logger/secret.sops.yaml and re-encrypt with sops."
        labels:
          severity: warning

  - name: Discogs
    type: vlogs
    interval: 15m
    rules:
      - alert: DiscogsLastCopy
        expr: 'k_labels_k6_cr:"discogs-watchlist" "Marketplace stats" | unpack_logfmt | unpack_json from msg | filter num_for_sale:=1 | stats by (title, release_id) count() as cnt | filter cnt:>0'
        annotations:
          summary: "Last copy: {{ $labels.title }}"
          description: "{{ $labels.title }} (release {{ $labels.release_id }}) has only 1 copy left for sale on Discogs."
        labels:
          severity: critical
      - alert: DiscogsForSaleZorica
        expr: 'k_labels_k6_cr:"discogs-watchlist" "Marketplace stats" Zorica | unpack_logfmt | unpack_json from msg | filter num_for_sale:>0 | stats by (title, release_id) count() as cnt | filter cnt:>0'
        annotations:
          summary: "Record for sale: Zorica"
          description: "{{ $labels.title }} (release {{ $labels.release_id }}) is available for sale on Discogs."
        labels:
          severity: critical
      - alert: DiscogsForSaleHero
        expr: 'k_labels_k6_cr:"discogs-watchlist" "Marketplace stats" "Hero" | unpack_logfmt | unpack_json from msg | filter num_for_sale:>0 | stats by (title, release_id) count() as cnt | filter cnt:>0'
        annotations:
          summary: "Record for sale: Hero"
          description: "{{ $labels.title }} (release {{ $labels.release_id }}) is available for sale on Discogs."
        labels:
          severity: critical