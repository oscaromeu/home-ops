---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit-agent
spec:
  chartRef:
    kind: OCIRepository
    name: fluent-bit
  values:
    existingConfigMap: fluentbit
    image:
      repository: cr.fluentbit.io/fluent/fluent-bit
      tag: 5.0.4-debug@sha256:8dafea5a0cd24e0d7e216932f7d8346335df20e0273506b93c1276f6781a8d0e
    args:
      - --workdir=/fluent-bit/etc
      - --config=/fluent-bit/etc/conf/fluentbit.yaml
    dashboards:
      enabled: true
    serviceMonitor:
      enabled: true
    logLevel: warn
    extraVolumes:
      - name: parsers
        configMap:
          defaultMode: 420
          name: parsers
      - name: pipelines-agent
        configMap:
          defaultMode: 420
          name: pipelines-agent
    extraVolumeMounts:
      - name: parsers
        mountPath: /fluent-bit/etc/conf/parsers.d/
      - name: pipelines-agent
        mountPath: /fluent-bit/etc/conf/pipelines.d/
