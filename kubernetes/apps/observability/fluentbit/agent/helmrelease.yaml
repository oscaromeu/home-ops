---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit-agent
spec:
  chartRef:
    kind: OCIRepository
    name: fluent-bit
  values:
    existingConfigMap: fluentbit
    image:
      repository: cr.fluentbit.io/fluent/fluent-bit
      tag: 5.0.6-debug@sha256:fb5ac98dc00a963a20db96545e84715a614215cc7e8afd07e103c273cc3b84e4
    args:
      - --workdir=/fluent-bit/etc
      - --config=/fluent-bit/etc/conf/fluentbit.yaml
    dashboards:
      enabled: true
    serviceMonitor:
      enabled: true
    logLevel: warn
    extraVolumes:
      - name: parsers
        configMap:
          defaultMode: 420
          name: parsers
      - name: pipelines-agent
        configMap:
          defaultMode: 420
          name: pipelines-agent
    extraVolumeMounts:
      - name: parsers
        mountPath: /fluent-bit/etc/conf/parsers.d/
      - name: pipelines-agent
        mountPath: /fluent-bit/etc/conf/pipelines.d/
