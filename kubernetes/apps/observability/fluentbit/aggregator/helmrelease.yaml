---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit-aggregator
spec:
  chartRef:
    kind: OCIRepository
    name: fluent-bit
  values:
    kind: Deployment
    replicaCount: 1
    rbac:
      create: true
      eventsAccess: true
    annotations:
      reloader.stakater.com/auto: "true"
    existingConfigMap: fluentbit
    image:
      repository: cr.fluentbit.io/fluent/fluent-bit
      tag: 5.0.9-debug@sha256:d9fc1e2472681eb7718aa6f8bdbe57e5fe77685b438bf8a63a1ef5e1274aafed
    args:
      - --workdir=/fluent-bit/etc
      - --config=/fluent-bit/etc/conf/fluentbit.yaml
    dashboards:
      enabled: true
    serviceMonitor:
      enabled: true
    logLevel: warn
    extraVolumes:
      - name: parsers
        configMap:
          defaultMode: 420
          name: parsers
      - name: pipelines-aggregator
        configMap:
          defaultMode: 420
          name: pipelines-aggregator
      # Uncomment together with kafka.yaml in pipelines/ once the Kafka
      # topic + producer are wired and this secret exists.
      #- name: topic-cluster-apps-logs-certs
      #  secret:
      #    secretName: topic-cluster-apps-logs-certs
      #    defaultMode: 420
    extraVolumeMounts:
      - name: parsers
        mountPath: /fluent-bit/etc/conf/parsers.d/
      - name: pipelines-aggregator
        mountPath: /fluent-bit/etc/conf/pipelines.d/
      #- name: topic-cluster-apps-logs-certs
      #  mountPath: /fluent-bit/etc/secrets/
      #  readOnly: true
