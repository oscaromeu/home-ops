---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit-forwarder
spec:
  chartRef:
    kind: OCIRepository
    name: fluent-bit
  values:
    annotations:
      reloader.stakater.com/auto: "true"
    existingConfigMap: fluentbit
    image:
      repository: cr.fluentbit.io/fluent/fluent-bit
      tag: 5.0.9-debug@sha256:d9fc1e2472681eb7718aa6f8bdbe57e5fe77685b438bf8a63a1ef5e1274aafed
    args:
      - --workdir=/fluent-bit/etc
      - --config=/fluent-bit/etc/conf/fluentbit.yaml
    dashboards:
      enabled: true
    serviceMonitor:
      enabled: true
    logLevel: warn
    extraVolumes:
      - name: parsers
        configMap:
          defaultMode: 420
          name: parsers
      - name: pipelines-forwarder
        configMap:
          defaultMode: 420
          name: pipelines-forwarder
    extraVolumeMounts:
      - name: parsers
        mountPath: /fluent-bit/etc/conf/parsers.d/
      - name: pipelines-forwarder
        mountPath: /fluent-bit/etc/conf/pipelines.d/
