---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: ck-push-test
  labels:
    app: ck-push-test
    k6-scenario: ck-push-test
spec:
  parallelism: 1
  runner:
    image: grafana/k6:2.0.0-with-browser@sha256:880501ca99b97a0e519c7ed6a038d7ce031b4181cf4843066aa97d33936294ad
    resources:
      requests:
        cpu: "100m"
      limits:
        memory: "256Mi"
    env:
      - name: CLICKHOUSE_URL
        value: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
      - name: CLICKHOUSE_USER
        value: default
  # Push directo a ClickHouse desde el JS via HTTP INSERT, sin remote_write.
  arguments: --quiet
  script:
    configMap:
      name: ck-push-test
      file: ck-push-test.js
