---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: prom-push-test-cron
spec:
  # Mismo intervalo que vm-push-test para comparación lado a lado.
  schedule: '*/10 * * * *'
  concurrencyPolicy: Allow
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccount: k6-observability
          containers:
            - name: kubectl
              image: bitnami/kubectl@sha256:3220dcc839f55be732a29548043a1ddf635a0dd6c8781b0f2a0bcdc19029c7d3
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - name: k6-yaml
                  mountPath: /tmp/
              command:
                - /bin/bash
              args:
                - -c
                - 'kubectl delete -f /tmp/prom-push-test.yaml; kubectl apply -f /tmp/prom-push-test.yaml'
          restartPolicy: OnFailure
          volumes:
            - name: k6-yaml
              configMap:
                name: prom-push-test-config
