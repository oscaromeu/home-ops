---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: prom-push-test
  labels:
    app: prom-push-test
    k6-scenario: prom-push-test
spec:
  parallelism: 1
  runner:
    image: grafana/k6:1.7.1-with-browser@sha256:be705b9a01364034907f4dbf8a6d6b8f0cd959051f08b1ce3383744abe7d1a00
    resources:
      requests:
        cpu: "100m"
      limits:
        memory: "256Mi"
    env:
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
  arguments: -o experimental-prometheus-rw --quiet
  script:
    configMap:
      name: prom-push-test
      file: prom-push-test.js
