---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: ip-logger
spec:
  parallelism: 1
  runner:
    image: grafana/k6:2.1.0-with-browser@sha256:40612240f5e37819faedb12b1df4e2cfbd7b0894475ff3c8b8f8f05239b7aff6
    resources:
      requests:
        cpu: "250m"
      limits:
        memory: "1Gi"
    env:
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
    envFrom:
      - secretRef:
          name: ip-logger-secret
  arguments: -o experimental-prometheus-rw --quiet
  script:
    configMap:
      name: ip-logger
      file: ip-logger.js
