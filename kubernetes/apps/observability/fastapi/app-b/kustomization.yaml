---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./test.yaml
  - ./snapshooter.yaml
configMapGenerator:
  - name: app-b-test
    files:
      - test.js=./test.js
  - name: app-b-config
    files:
      - test.yaml=./test.yaml
generatorOptions:
  disableNameSuffixHash: true
