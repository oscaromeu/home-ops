---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app-a
spec:
  chartRef:
    kind: OCIRepository
    name: app-a
  values:
    controllers:
      app-a:
        containers:
          app:
            image:
              repository: ghcr.io/oscaromeu/fastapi-observability/app
              tag: latest@sha256:f6d03f95b57753d9eac9c94baeffad50c20fb89e31bf2a2d340dfa525ceaf660
            env:
              TARGET_ONE_HOST: app-b
              TARGET_TWO_HOST: app-c
              APP_NAME: app-a
              OTLP_GRPC_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
              OTEL_RESOURCE_ATTRIBUTES: service.name=app-a
              OTEL_METRICS_EXPORTER: none
    service:
      app:
        ports:
          http:
            port: 8000
    route:
      app:
        hostnames: ["app-a.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
