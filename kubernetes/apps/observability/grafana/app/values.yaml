---
extraInitContainers:
  - name: 01-init-db
    image: ghcr.io/home-operations/postgres-init:18@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
    envFrom:
      - secretRef:
          name: postgres-${postgres_cluster_version}-pguser-grafana
admin:
  existingSecret: grafana-admin-secret
replicas: 2
image:
  registry: docker.io
  repository: grafana/grafana
  tag: 13.1.0-25644485979@sha256:3a3434e81d6394ce16568016984e730a4c847ab0bee638691d11c8d5e160a2b0
  pullPolicy: IfNotPresent
env:
  GF_EXPLORE_ENABLED: true
  GF_SERVER_ROOT_URL: "https://grafana.${SECRET_DOMAIN}"
  GF_FEATURE_TOGGLES_ENABLE: flameGraph
  GF_DIAGNOSTICS_PROFILING_ENABLED: true
  GF_DIAGNOSTICS_PROFILING_ADDR: 0.0.0.0
  GF_DIAGNOSTICS_PROFILING_PORT: 6060
  # Database
  GF_DATABASE_SSL_MODE: disable
  GF_DATABASE_TYPE: postgres
envFromSecrets:
  - name: postgres-${postgres_cluster_version}-pguser-grafana
  - name: grafana-oidc-secret
grafana.ini:
  analytics:
    check_for_updates: false
    check_for_plugin_updates: false
  auth.anonymous:
    enabled: false
    org_name: "Main Org."
    org_role: "Viewer"
  dataproxy:
    max_idle_connections: 500
  security:
    allow_embedding: true
  "auth.generic_oauth":
    enabled: true
    name: Authentik
    icon: signin
    allow_sign_up: true
    auto_login: false
    client_id: grafana
    # client_secret comes from grafana-oidc-secret (env var GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET)
    scopes: openid profile email groups grafana_identity
    auth_url: https://auth.${SECRET_DOMAIN}/application/o/authorize/
    token_url: https://auth.${SECRET_DOMAIN}/application/o/token/
    api_url: https://auth.${SECRET_DOMAIN}/application/o/userinfo/
    use_pkce: true
    login_attribute_path: preferred_username
    email_attribute_path: email
    # Map Authentik org-wide groups → Grafana roles.
    role_attribute_path: contains(groups[*], 'admins') && 'GrafanaAdmin' || 'Viewer'
    allow_assign_grafana_admin: true
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - { name: Prometheus, orgId: 1 }
      - { name: VictoriaMetrics, orgId: 1 }
      - { name: VictoriaTraces, orgId: 1 }
      - { name: VictoriaLogs, orgId: 1 }
      - { name: ClickHouse, orgId: 1 }
    datasources:
      - uid: prometheus
        name: Prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          httpMethod: POST
          exemplarTraceIdDestinations:
            - datasourceUid: victoria-traces
              name: TraceID
      - uid: victoria-metrics
        name: VictoriaMetrics
        type: victoriametrics-metrics-datasource
        access: proxy
        url: http://victoria-metrics-server.observability.svc.cluster.local:8428
        editable: true
        jsonData:
          httpMethod: POST
      - uid: clickhouse
        name: ClickHouse
        type: grafana-clickhouse-datasource
        access: proxy
        editable: true
        jsonData:
          protocol: http
          host: clickhouse-clickhouse-headless.databases.svc.cluster.local
          port: 8123
          username: default
          defaultDatabase: observability
      - uid: victoria-traces
        name: VictoriaTraces
        type: jaeger
        access: proxy
        url: http://victoria-traces-server.observability.svc.cluster.local:10428/select/jaeger
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: victoria-logs
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: false
            customQuery: true
            query: "$$$${__trace.traceId}"
      - uid: victoria-logs
        name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        editable: true
        url: http://victoria-logs-server.observability.svc.cluster.local:9428
        jsonData:
          derivedFields:
            - datasourceUid: victoria-traces
              matcherRegex: "trace_id=(\\w+)"
              name: TraceID
              url: "$$$${__value.raw}"
sidecar:
  dashboards:
    enabled: false
  datasources:
    enabled: true
    searchNamespace: ALL
  provider:
    allowUiUpdates: true
serviceMonitor:
  enabled: true
route:
  main:
    enabled: true
    hostnames: ["grafana.${SECRET_DOMAIN}"]
    parentRefs:
      - name: envoy-internal
        namespace: network
testFramework:
  enabled: false
plugins:
  - victoriametrics-logs-datasource
  - victoriametrics-metrics-datasource
  - grafana-clickhouse-datasource
  - digrich-bubblechart-panel
  - grafana-clock-panel
  - redis-datasource
  - marcusolsson-hexmap-panel
  - grafana-polystat-panel
  - pyroscope-panel
  - flant-statusmap-panel
  - marcusolsson-csv-datasource
