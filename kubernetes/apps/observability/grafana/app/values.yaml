extraInitContainers:
  - name: 01-init-db
    image: ghcr.io/home-operations/postgres-init:18
    envFrom:
      - secretRef:
          name: postgres-${postgres_cluster_version}-pguser-grafana
admin:
  existingSecret: grafana-admin-secret
replicas: 2
image:
  registry: docker.io
  repository: grafana/grafana-dev
  tag: 12.4.0-19426561773
  pullPolicy: IfNotPresent
env:
  GF_EXPLORE_ENABLED: true
  GF_SERVER_ROOT_URL: "https://grafana.${SECRET_DOMAIN}"
  GF_FEATURE_TOGGLES_ENABLE: flameGraph
  GF_AUTH_ANONYMOUS_ENABLED: true
  GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
  GF_DIAGNOSTICS_PROFILING_ENABLED: true
  GF_DIAGNOSTICS_PROFILING_ADDR: 0.0.0.0
  GF_DIAGNOSTICS_PROFILING_PORT: 6060
  # Database
  GF_DATABASE_SSL_MODE: disable
  GF_DATABASE_TYPE: postgres
envFromSecrets:
  - name: postgres-${postgres_cluster_version}-pguser-grafana
grafana.ini:
  analytics:
    check_for_updates: false
    check_for_plugin_updates: false
  auth.anonymous:
    enabled: true
    org_name: "Main Org."
    org_role: "Viewer"
  dataproxy:
    max_idle_connections: 500
  security:
    allow_embedding: true
  feature_toggles:
    provisioning: true
    kubernetesDashboards: true
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - { name: Prometheus, orgId: 1 }
      - { name: VictoriaTraces, orgId: 1 }
      - { name: VictoriaLogs, orgId: 1 }
    datasources:
      - uid: prometheus
        name: Prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        isDefault: true
      - uid: victoria-traces
        name: VictoriaTraces
        type: jaeger
        access: proxy
        url: http://victoria-traces-server.observability.svc.cluster.local:10428/select/jaeger
      - uid: victoria-logs
        name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs-server.observability.svc.cluster.local:9428
      #- name: Pyroscope
      #  type: pyroscope
      #  url: http://pyroscope-querier.observability.svc.cluster.local:4040
sidecar:
  dashboards:
    enabled: false
  datasources:
    enabled: true
    searchNamespace: ALL
  provider:
    allowUiUpdates: true
serviceMonitor:
  enabled: true
route:
  main:
    enabled: true
    hostnames: ["grafana.${SECRET_DOMAIN}"]
    parentRefs:
      - name: envoy-internal
        namespace: network
testFramework:
  enabled: false
plugins:
  - victoriametrics-logs-datasource
  - digrich-bubblechart-panel
  - grafana-clock-panel
  - redis-datasource
  - marcusolsson-hexmap-panel
  - grafana-polystat-panel
  - pyroscope-panel
  - flant-statusmap-panel
  - marcusolsson-csv-datasource
