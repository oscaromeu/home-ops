---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics
  values:
    fullnameOverride: victoria-metrics
    server:
      replicaCount: 1
      persistentVolume:
        enabled: true
        storageClassName: openebs-hostpath
        size: 20Gi
      retentionPeriod: 14d
      extraArgs:
        envflag.enable: "true"
        envflag.prefix: VM_
        loggerFormat: json
        httpListenAddr: :8428
        http.shutdownDelay: 15s
      route:
        enabled: true
        hostnames:
          - victoria-metrics.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        extraRules:
          - filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /vmui/
                  statusCode: 302
            matches:
              - path:
                  type: Exact
                  value: /
      serviceMonitor:
        enabled: true
        interval: 15s
