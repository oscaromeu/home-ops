---
connectivity:
  checker:
    interval: 1m
    target: 1.1.1.1:53

endpoints:
  - alerts:
      - type: pushover
    conditions:
      - "[CONNECTED] == true"
    group: connectivity
    interval: 1m
    name: Cloudflare
    url: icmp://1.1.1.1

  - alerts:
      - type: pushover
    conditions:
      - "[CONNECTED] == true"
    group: connectivity
    interval: 1m
    name: Google
    url: icmp://8.8.8.8

  - alerts:
      - type: pushover
        description: "See https://status.cloud.google.com/ for details"
    conditions:
      - 'any([BODY].#(end==null).affected_products.#.title) != "Google Cloud Storage"'
    group: providers
    interval: 5m
    name: GCP · Cloud Storage
    ui:
      hide-hostname: true
      hide-url: true
    url: &gcp_incidents https://status.cloud.google.com/incidents.json

  - alerts:
      - type: pushover
        description: "See https://status.cloud.google.com/ for details"
    conditions:
      - 'any([BODY].#(end==null).affected_products.#.title) != "Google Cloud SQL"'
    group: providers
    interval: 5m
    name: GCP · Cloud SQL
    ui:
      hide-hostname: true
      hide-url: true
    url: *gcp_incidents

  - alerts:
      - type: pushover
        description: "See https://status.cloud.google.com/ for details"
    conditions:
      - 'any([BODY].#(end==null).affected_products.#.title) != "Google Kubernetes Engine"'
    group: providers
    interval: 5m
    name: GCP · GKE
    ui:
      hide-hostname: true
      hide-url: true
    url: *gcp_incidents

  - alerts:
      - type: pushover
        description: "See https://status.cloud.google.com/ for details"
    conditions:
      - 'any([BODY].#(end==null).affected_products.#.title) != "Virtual Private Cloud (VPC)"'
      - 'any([BODY].#(end==null).affected_products.#.title) != "Cloud Load Balancing"'
      - 'any([BODY].#(end==null).affected_products.#.title) != "Google Cloud DNS"'
      - 'any([BODY].#(end==null).affected_products.#.title) != "Hybrid Connectivity"'
      - 'any([BODY].#(end==null).affected_products.#.title) != "Private Service Connect"'
    group: providers
    interval: 5m
    name: GCP · Networking
    ui:
      hide-hostname: true
      hide-url: true
    url: *gcp_incidents

  - alerts:
      - type: pushover
        description: "See https://status.claude.com/ for details"
    conditions:
      - "[BODY].status.indicator == none"
    group: providers
    interval: 5m
    name: Claude
    ui:
      hide-hostname: true
      hide-url: true
    url: https://status.claude.com/api/v2/status.json

  - alerts:
      - type: pushover
        description: "See https://www.cloudflarestatus.com/ for details"
    conditions:
      - "[BODY].status.indicator == none"
    group: providers
    interval: 5m
    name: Cloudflare
    ui:
      hide-hostname: true
      hide-url: true
    url: https://www.cloudflarestatus.com/api/v2/status.json

  - alerts:
      - type: pushover
        description: "See https://status.tailscale.com/ for details"
    conditions:
      - "[BODY].status.indicator == none"
    group: providers
    interval: 5m
    name: Tailscale
    ui:
      hide-hostname: true
      hide-url: true
    url: https://status.tailscale.com/api/v2/status.json

  - alerts:
      - type: pushover
        description: "See https://www.githubstatus.com/ for details"
    conditions:
      - "[BODY].status.indicator == none"
    group: providers
    interval: 5m
    name: GitHub
    ui:
      hide-hostname: true
      hide-url: true
    url: https://www.githubstatus.com/api/v2/status.json

metrics: true

storage:
  caching: true
  path: ${GATUS_CONFIG_PATH}/gatus.db
  type: sqlite

ui:
  buttons:
    - name: Github
      link: https://github.com/oscaromeu
    - name: Homelab
      link: https://github.com/oscaromeu/home-ops
    - name: GCP
      link: https://status.cloud.google.com/
    - name: Claude
      link: https://status.claude.com/
    - name: Cloudflare
      link: https://www.cloudflarestatus.com/
    - name: Tailscale
      link: https://status.tailscale.com/
    - name: GitHub Status
      link: https://www.githubstatus.com/
  default-sort-by: group
  header: Status
  link: https://github.com/oscaromeu
  title: Status | Gatus

web:
  port: ${GATUS_WEB_PORT}
