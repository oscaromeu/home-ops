---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: copyparty
spec:
  chartRef:
    kind: OCIRepository
    name: copyparty
  values:
    controllers:
      copyparty:
        containers:
          app:
            image:
              repository: ghcr.io/9001/copyparty-ac
              tag: 1.20.17@sha256:8906f3a4dbf745664634aea5d8a3fc2e5cc5a3d0d5edcf0a991dda613068d2aa
            env:
              TZ: ${TIMEZONE}
              PRTY_NO_TLS: 1
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
          - 65537
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: &port 3923
    route:
      app:
        hostnames: ["copyparty.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    configMaps:
      config:
        data:
          copyparty.conf: |
            [global]
              e2dsa
              e2ts
              grid
              hist: /state/hist
              shr: /share
              shr-db: /state/shares.db
              shr-adm: oscar
              xff-src: 10.42.0.0/16

            [/media]
              /w/media
              accs:
                r: *
                A: oscar
    persistence:
      config:
        type: configMap
        name: copyparty
        globalMounts:
          - path: /cfg/copyparty.conf
            subPath: copyparty.conf
      accounts:
        type: secret
        name: copyparty-secret
        globalMounts:
          - path: /cfg/accounts.conf
            subPath: accounts.conf
      state:
        existingClaim: copyparty
        globalMounts:
          - path: /state
      media:
        type: nfs
        server: ${NAS_SERVER_IP}
        path: ${NAS_SERVER_MEDIA_PATH}/Library
        globalMounts:
          - path: /w/media
