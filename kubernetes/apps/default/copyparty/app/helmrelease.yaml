---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: copyparty
spec:
  chartRef:
    kind: OCIRepository
    name: copyparty
  values:
    controllers:
      copyparty:
        containers:
          app:
            image:
              repository: ghcr.io/9001/copyparty-dj
              tag: 1.20.17@sha256:36a897d21e57242232615211ad3c6aaecd6c7d6eccd1a432be1ad2b00c82a413
            env:
              TZ: ${TIMEZONE}
              PRTY_NO_TLS: 1
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
          - 65537
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: &port 3923
    route:
      app:
        hostnames: ["copyparty.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    configMaps:
      config:
        data:
          copyparty.conf: |
            [global]
              e2dsa
              # TODO: revert to e2ts once the one-shot tag-db rebuild completes
              e2tsr
              grid
              hist: /state/hist
              shr: /share
              shr-db: /state/shares.db
              shr-adm: oscar
              xff-src: 10.42.0.0/16
              mtp: .bpm=f,t30,/mtag/audio-bpm.py
              mtp: key=f,t190,/mtag/audio-key.py

            [/media]
              /w/media
              accs:
                r: *
                A: oscar
    persistence:
      config:
        type: configMap
        name: copyparty
        globalMounts:
          - path: /cfg/copyparty.conf
            subPath: copyparty.conf
      accounts:
        type: secret
        name: copyparty-secret
        globalMounts:
          - path: /cfg/accounts.conf
            subPath: accounts.conf
      state:
        existingClaim: copyparty
        globalMounts:
          - path: /state
      media:
        type: nfs
        server: ${NAS_SERVER_IP}
        path: ${NAS_SERVER_MEDIA_PATH}/Library
        globalMounts:
          - path: /w/media
