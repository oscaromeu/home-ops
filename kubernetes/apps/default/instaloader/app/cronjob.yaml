---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: instaloader
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            supplementalGroups:
              - 65537
          containers:
            - name: instaloader
              image: python:3.14-slim@sha256:44dd04494ee8f3b538294360e7c4b3acb87c8268e4d0a4828a6500b1eff50061
              command:
                - /bin/sh
                - -c
                - |
                  pip install instaloader --quiet --no-cache-dir --target=/tmp/pkgs
                  while IFS= read -r profile || [ -n "$profile" ]; do
                    [ -z "$profile" ] && continue
                    echo "Downloading: $profile"
                    PYTHONPATH=/tmp/pkgs python -m instaloader \
                      --no-pictures \
                      --no-metadata-json \
                      --no-captions \
                      --no-compress-json \
                      --reels \
                      --dirname-pattern=/downloads/{profile} \
                      "$profile"
                  done < /config/profiles
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
              volumeMounts:
                - name: downloads
                  mountPath: /downloads
                  subPath: Library/Instagram
                - name: config
                  mountPath: /config
          volumes:
            - name: downloads
              nfs:
                server: ${NAS_SERVER_IP}
                path: ${NAS_SERVER_MEDIA_PATH}
            - name: config
              secret:
                secretName: instaloader-secret
