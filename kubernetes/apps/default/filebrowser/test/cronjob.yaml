---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: filebrowser-test
  labels:
    app.kubernetes.io/name: filebrowser-test
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: filebrowser-test
        spec:
          restartPolicy: Never
          initContainers:
            - name: load-tests
              image: ghcr.io/oscaromeu/playwright-runner:1.57.0@sha256:bd04fbccbdb0be44f86b7ea9f1fae69fe0bb84050ea7cf0122a03c5a4cbce879
              command: ["sh", "-c", "cp -rL /cm/* /tests/ && ls -la /tests"]
              volumeMounts:
                - name: cm
                  mountPath: /cm
                - name: tests
                  mountPath: /tests
          containers:
            - name: playwright
              image: ghcr.io/oscaromeu/playwright-runner:1.57.0@sha256:bd04fbccbdb0be44f86b7ea9f1fae69fe0bb84050ea7cf0122a03c5a4cbce879
              imagePullPolicy: IfNotPresent
              env:
                - name: PW_BASE_URL
                  value: https://fb.${SECRET_DOMAIN}
                - name: PROBE_NAME
                  value: filebrowser
                - name: PROBE_ENV
                  value: homelab
                # Per-probe thresholds → e2e.probe_config (filebrowser is a SPA
                # page load, so it uses the default page-oriented SLA tiers).
                - name: PROBE_SLO_TARGET
                  value: "99"
                - name: PROBE_HIGH_MS
                  value: "2000"
                - name: PROBE_CRITICAL_MS
                  value: "4000"
                - name: PROBE_FATAL_MS
                  value: "8000"
                - name: CLICKHOUSE_URL
                  value: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
                - name: CLICKHOUSE_DATABASE
                  value: e2e
                - name: CLICKHOUSE_USER
                  value: default
              volumeMounts:
                - name: tests
                  mountPath: /tests
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 2Gi
          volumes:
            - name: cm
              configMap:
                name: filebrowser-test
            - name: tests
              emptyDir: {}
