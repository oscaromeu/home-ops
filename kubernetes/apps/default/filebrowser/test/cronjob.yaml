---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: filebrowser-test
  labels:
    app.kubernetes.io/name: filebrowser-test
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: filebrowser-test
        spec:
          restartPolicy: Never
          initContainers:
            - name: load-tests
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:0f899bf7305466e1178ae684f67379b7c72f630b435f4e2b209d3026ab6fbfb7
              command: ["sh", "-c", "cp -rL /cm/* /tests/ && ls -la /tests"]
              volumeMounts:
                - name: cm
                  mountPath: /cm
                - name: tests
                  mountPath: /tests
          containers:
            - name: playwright
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:0f899bf7305466e1178ae684f67379b7c72f630b435f4e2b209d3026ab6fbfb7
              imagePullPolicy: IfNotPresent
              env:
                - name: PW_BASE_URL
                  value: https://fb.${SECRET_DOMAIN}
                - name: PROBE_NAME
                  value: filebrowser
                - name: PROBE_ENV
                  value: homelab
                - name: CLICKHOUSE_URL
                  value: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
                - name: CLICKHOUSE_DATABASE
                  value: e2e
                - name: CLICKHOUSE_USER
                  value: default
              volumeMounts:
                - name: tests
                  mountPath: /tests
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 2Gi
          volumes:
            - name: cm
              configMap:
                name: filebrowser-test
            - name: tests
              emptyDir: {}
