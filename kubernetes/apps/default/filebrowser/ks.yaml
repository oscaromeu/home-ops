---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app filebrowser
spec:
  dependsOn:
    - name: envoy-gateway
      namespace: network
  path: ./kubernetes/apps/default/filebrowser/app
  targetNamespace: default
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: filebrowser-test
spec:
  dependsOn:
    - name: filebrowser
  path: ./kubernetes/apps/default/filebrowser/test
  targetNamespace: default

