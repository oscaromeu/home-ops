---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: echo-test
  labels:
    app.kubernetes.io/name: echo-test
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: echo-test
        spec:
          restartPolicy: Never
          initContainers:
            - name: load-tests
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:d68de8b8f3e13d7bb53b0de73a1b63187a9d5239ed20d7facf06c3f4279758c1
              command: ["sh", "-c", "cp -rL /cm/* /tests/ && ls -la /tests"]
              volumeMounts:
                - name: cm
                  mountPath: /cm
                - name: tests
                  mountPath: /tests
          containers:
            - name: playwright
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:d68de8b8f3e13d7bb53b0de73a1b63187a9d5239ed20d7facf06c3f4279758c1
              imagePullPolicy: IfNotPresent
              env:
                - name: PW_BASE_URL
                  value: https://echo.${SECRET_DOMAIN}
                - name: PROBE_NAME
                  value: echo
                - name: PROBE_ENV
                  value: homelab
                - name: CLICKHOUSE_URL
                  value: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
                - name: CLICKHOUSE_DATABASE
                  value: e2e
                - name: CLICKHOUSE_USER
                  value: default
              volumeMounts:
                - name: tests
                  mountPath: /tests
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 2Gi
          volumes:
            - name: cm
              configMap:
                name: echo-test
            - name: tests
              emptyDir: {}
