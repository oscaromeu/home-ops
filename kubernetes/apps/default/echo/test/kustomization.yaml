---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./cronjob.yaml
configMapGenerator:
  # The Playwright spec lives as a real .ts file and is mounted into the runner
  # at /tests. The image stays generic; only this spec changes.
  - name: echo-test
    files:
      - echo.spec.ts=./echo.spec.ts
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # Don't let Flux postBuild touch ${...} inside the test source.
    kustomize.toolkit.fluxcd.io/substitute: disabled
