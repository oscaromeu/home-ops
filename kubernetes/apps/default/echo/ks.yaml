---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: echo
spec:
  path: ./kubernetes/apps/default/echo/app
  targetNamespace: default
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: echo-test
spec:
  dependsOn:
    - name: echo
  path: ./kubernetes/apps/default/echo/test
  targetNamespace: default
