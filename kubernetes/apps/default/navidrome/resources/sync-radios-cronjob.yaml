---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: navidrome-sync-radios
spec:
  schedule: "0 6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: docker.io/alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -uo pipefail
                  apk add --no-cache curl yq bash ca-certificates >/dev/null

                  ND_BASE="http://navidrome.default.svc.cluster.local:8080/rest"
                  ND_USER="admin"
                  ND_PASS="$$ND_INITIALADMINPASSWORD"
                  SALT=$$(head -c 16 /dev/urandom | od -An -tx1 | tr -d ' \n')
                  TOKEN=$$(printf '%s%s' "$$ND_PASS" "$$SALT" | md5sum | awk '{print $$1}')
                  COMMON_QS="u=$$ND_USER&t=$$TOKEN&s=$$SALT&v=1.16.1&c=navidrome-sync-radios&f=json"

                  RADIOS_FILE=/etc/radios/radios.yaml
                  echo "[sync] reading $$RADIOS_FILE..."
                  COUNT=$$(yq '. | length' "$$RADIOS_FILE")
                  echo "[sync] $$COUNT radios definidas en YAML"

                  echo "[sync] fetching existing internet radios from Navidrome..."
                  RESP=$$(curl -fsSL "$$ND_BASE/getInternetRadioStations?$$COMMON_QS") || {
                    echo "[sync] FAILED to call getInternetRadioStations"; exit 1; }

                  # Map "name" -> "id" for quick lookup
                  EXISTING=$$(echo "$$RESP" \
                    | grep -oE '"id":"[^"]*","name":"[^"]*"' \
                    | sed -E 's/"id":"([^"]+)","name":"([^"]+)"/\1|\2/')

                  find_id() {
                    local target="$$1"
                    echo "$$EXISTING" | awk -F'|' -v t="$$target" '$$2 == t {print $$1; exit}'
                  }

                  created=0; updated=0; failed=0

                  for i in $$(seq 0 $$((COUNT - 1))); do
                    name=$$(yq ".[$$i].name" "$$RADIOS_FILE")
                    url=$$(yq ".[$$i].url"  "$$RADIOS_FILE")
                    home=$$(yq ".[$$i].homepage // \"\"" "$$RADIOS_FILE")

                    existing_id=$$(find_id "$$name")

                    if [ -n "$$existing_id" ]; then
                      action=update
                      endpoint=updateInternetRadioStation
                      extra="--data-urlencode id=$$existing_id"
                    else
                      action=create
                      endpoint=createInternetRadioStation
                      extra=""
                    fi

                    echo "[sync] $$action: $$name -> $$url"
                    resp=$$(curl -fsSL --get \
                      --data-urlencode "u=$$ND_USER" \
                      --data-urlencode "t=$$TOKEN" \
                      --data-urlencode "s=$$SALT" \
                      --data-urlencode "v=1.16.1" \
                      --data-urlencode "c=navidrome-sync-radios" \
                      --data-urlencode "f=json" \
                      --data-urlencode "name=$$name" \
                      --data-urlencode "streamUrl=$$url" \
                      --data-urlencode "homepageUrl=$$home" \
                      $$extra \
                      "$$ND_BASE/$$endpoint") || resp='{"subsonic-response":{"status":"failed"}}'
                    status=$$(echo "$$resp" | grep -oE '"status":"[^"]*"' | head -1 | sed 's/"status":"//; s/"$//')
                    if [ "$$status" = "ok" ]; then
                      echo "[sync] -> $$action ok"
                      [ "$$action" = update ] && updated=$$((updated + 1)) || created=$$((created + 1))
                    else
                      echo "[sync] -> FAILED: $$resp"
                      failed=$$((failed + 1))
                    fi
                  done

                  echo "[sync] done. created=$$created updated=$$updated failed=$$failed"
                  [ $$failed -eq 0 ]
              envFrom:
                - secretRef:
                    name: navidrome   # ND_INITIALADMINPASSWORD
              volumeMounts:
                - name: radios
                  mountPath: /etc/radios
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
          volumes:
            - name: radios
              configMap:
                name: navidrome-radios
