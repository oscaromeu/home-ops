---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: navidrome-sync-radios
spec:
  schedule: "0 6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: ghcr.io/oscaromeu/ops-tools:rolling@sha256:d29ffa747bdc850180de1eb7b552237c07e693036612d80bae2c60742e4eab4c
              command: ["/usr/bin/catatonit", "--", "python3", "/scripts/sync-radios.py"]
              envFrom:
                - secretRef:
                    name: navidrome   # ND_INITIALADMINPASSWORD
              volumeMounts:
                - name: radios
                  mountPath: /etc/radios
                  readOnly: true
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: radios
              configMap:
                name: navidrome-radios
            - name: scripts
              configMap:
                name: navidrome-scripts
