---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./cronjob.yaml
configMapGenerator:
  # The Playwright spec lives as a real .ts file next to the app and is mounted
  # into the runner at /tests. The image stays generic; only this spec changes.
  - name: podinfo-test
    files:
      - podinfo.spec.ts=./podinfo.spec.ts
      - net-timing.ts=./net-timing.ts
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # Don't let Flux postBuild touch ${...} inside the test source.
    kustomize.toolkit.fluxcd.io/substitute: disabled
