---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: podinfo-test
  labels:
    app.kubernetes.io/name: podinfo-test
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: podinfo-test
        spec:
          restartPolicy: Never
          initContainers:
            - name: load-tests
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:d68de8b8f3e13d7bb53b0de73a1b63187a9d5239ed20d7facf06c3f4279758c1
              command: ["sh", "-c", "cp -rL /cm/* /tests/ && ls -la /tests"]
              volumeMounts:
                - name: cm
                  mountPath: /cm
                - name: tests
                  mountPath: /tests
          containers:
            - name: playwright
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:d68de8b8f3e13d7bb53b0de73a1b63187a9d5239ed20d7facf06c3f4279758c1
              imagePullPolicy: IfNotPresent
              # Run the probe, then upload the HTML report (video+trace embedded
              # on failure) to Garage under synthetics/<probe>/<timestamp>/report.
              command: ["/app/run-and-upload.sh"]
              env:
                - name: PW_BASE_URL
                  value: https://podinfo.${SECRET_DOMAIN}
                - name: PROBE_NAME
                  value: podinfo
                - name: PROBE_ENV
                  value: homelab
                - name: PW_VIDEO
                  value: retain-on-failure
                - name: PW_TRACE
                  value: retain-on-failure
                # Artifact upload to object storage (Garage). PROBE_REPORT_URL is
                # derived in the entrypoint from base + probe + run timestamp.
                - name: PROBE_ARTIFACT_BASE
                  value: https://garage.${SECRET_DOMAIN}
                - name: S3_ENDPOINT
                  value: garage.storage.svc.cluster.local:3900
                - name: S3_BUCKET
                  value: synthetics
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: e2e-s3-credentials
                      key: access-key
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: e2e-s3-credentials
                      key: secret-key
                - name: CLICKHOUSE_URL
                  value: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
                - name: CLICKHOUSE_DATABASE
                  value: e2e
                - name: CLICKHOUSE_USER
                  value: default
              volumeMounts:
                - name: tests
                  mountPath: /tests
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 2Gi
          volumes:
            - name: cm
              configMap:
                name: podinfo-test
            - name: tests
              emptyDir: {}
