---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: podinfo-test
  labels:
    app.kubernetes.io/name: podinfo-test
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: podinfo-test
        spec:
          restartPolicy: Never
          initContainers:
            - name: load-tests
              image: ghcr.io/oscaromeu/playwright-runner:1.57.0@sha256:fd630448b282cc174a6dd300ae0d63a48bdffb6bd00c0a02b505685de17a4fcd
              command: ["sh", "-c", "cp -rL /cm/* /tests/ && ls -la /tests"]
              volumeMounts:
                - name: cm
                  mountPath: /cm
                - name: tests
                  mountPath: /tests
          containers:
            - name: playwright
              image: ghcr.io/oscaromeu/playwright-runner:1.57.0@sha256:fd630448b282cc174a6dd300ae0d63a48bdffb6bd00c0a02b505685de17a4fcd
              imagePullPolicy: IfNotPresent
              # Run the probe, then upload the HTML report (video+trace embedded
              # on failure) to Garage under synthetics/<probe>/<timestamp>/report.
              command: ["/app/run-and-upload.sh"]
              env:
                - name: PW_BASE_URL
                  value: https://podinfo.${SECRET_DOMAIN}
                - name: PROBE_NAME
                  value: podinfo
                - name: PROBE_ENV
                  value: homelab
                # Per-probe thresholds → e2e.probe_config (reporter upserts them).
                - name: PROBE_SLO_TARGET
                  value: "99"
                - name: PROBE_HIGH_MS
                  value: "2000"
                - name: PROBE_CRITICAL_MS
                  value: "4000"
                - name: PROBE_FATAL_MS
                  value: "8000"
                - name: PW_VIDEO
                  value: retain-on-failure
                - name: PW_TRACE
                  value: retain-on-failure
                # Artifact upload to object storage (Garage). PROBE_REPORT_URL is
                # derived in the entrypoint from base + probe + run timestamp.
                - name: PROBE_ARTIFACT_BASE
                  value: https://synthetics.${SECRET_DOMAIN}
                - name: S3_ENDPOINT
                  value: garage.storage.svc.cluster.local:3900
                - name: S3_BUCKET
                  value: synthetics
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: e2e-s3-credentials
                      key: access-key
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: e2e-s3-credentials
                      key: secret-key
                - name: CLICKHOUSE_URL
                  value: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
                - name: CLICKHOUSE_DATABASE
                  value: e2e
                - name: CLICKHOUSE_USER
                  value: default
                # A/B: the SAME run also pushes per-run gauges to Pushgateway
                # (reporter-prometheus, gated by this var). Requires the rebuilt
                # image that bakes the reporter — bump the digest above first.
                - name: PUSHGATEWAY_URL
                  value: http://pushgateway.observability.svc.cluster.local:9091
              volumeMounts:
                - name: tests
                  mountPath: /tests
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 2Gi
          volumes:
            - name: cm
              configMap:
                name: podinfo-test
            - name: tests
              emptyDir: {}
