---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: podinfo-test
  labels:
    app.kubernetes.io/name: podinfo-test
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: podinfo-test
        spec:
          restartPolicy: Never
          initContainers:
            - name: load-tests
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:df5e4e739ac540036d47dadd3c261f9436bdcdceaab69e383d5529ace1f260cd
              command: ["sh", "-c", "cp -rL /cm/* /tests/ && ls -la /tests"]
              volumeMounts:
                - name: cm
                  mountPath: /cm
                - name: tests
                  mountPath: /tests
          containers:
            - name: playwright
              image: ghcr.io/oscaromeu/playwright-runner:rolling@sha256:df5e4e739ac540036d47dadd3c261f9436bdcdceaab69e383d5529ace1f260cd
              imagePullPolicy: IfNotPresent
              env:
                - name: PW_BASE_URL
                  value: https://podinfo.${SECRET_DOMAIN}
                # Specs are mounted in /tests (outside /app), so Node can't find
                # @playwright/test in /app/node_modules by walking up. NODE_PATH
                # makes it resolvable. Baked into the image from the next build;
                # kept here so the current pinned digest works too.
                - name: NODE_PATH
                  value: /app/node_modules
                # ClickHouse reporter (runs + steps). User `default`, no password (PoC).
                - name: PROBE_NAME
                  value: podinfo
                - name: PROBE_ENV
                  value: homelab
                - name: CLICKHOUSE_URL
                  value: http://clickhouse-clickhouse-headless.databases.svc.cluster.local:8123
                - name: CLICKHOUSE_DATABASE
                  value: e2e
                - name: CLICKHOUSE_USER
                  value: default
              volumeMounts:
                - name: tests
                  mountPath: /tests
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 2Gi
          volumes:
            - name: cm
              configMap:
                name: podinfo-test
            - name: tests
              emptyDir: {}
