---
# v0 / hack: HelmRelease estática con un Deployment por streamer.
# Vivirá hasta que el operator (HO-38) esté listo, momento en que se
# borra entera.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: twitch-radios
spec:
  dependsOn:
    - name: icecast
    - name: external-secrets
      namespace: external-secrets
  path: ./kubernetes/apps/default/twitch-radios/app
  targetNamespace: default
