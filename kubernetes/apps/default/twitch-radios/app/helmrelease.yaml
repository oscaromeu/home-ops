---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
#
# v0 / hack: 1 Deployment por streamer. El worker corre dentro de un wrapper
# while-true que reintenta cada 30s si streamlink sale (offline o stream end).
# Se borrará cuando el operator de HO-38 esté listo.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: twitch-radios
spec:
  chartRef:
    kind: OCIRepository
    name: twitch-radios
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

    controllers:
      radio-1: &radioController
        annotations: &radioAnnotations
          reloader.stakater.com/auto: "true"
        containers:
          app: &radioContainer
            image: &radioImage
              repository: ghcr.io/oscaromeu/twitch-radio-worker
              tag: rolling
            command: &radioCommand ["/usr/bin/catatonit", "--", "/bin/bash", "-c"]
            args: &radioArgs
              - |
                set -uo pipefail
                export ICECAST_MOUNT="/$${CHANNEL}.mp3"
                while true; do
                  echo "[wrapper] starting pipeline for $${CHANNEL}"
                  /entrypoint.sh || echo "[wrapper] pipeline exited rc=$$? — sleeping 30s"
                  sleep 30
                done
            env:
              ICECAST_URL: &icecastUrl http://icecast.default.svc.cluster.local:8000
              QUALITY: &quality audio_only
              ENCODE_MODE: &encodeMode mp3
              BITRATE: &bitrate "320k"
              ICECAST_PASS: &icecastPass
                valueFrom:
                  secretKeyRef:
                    name: icecast-secrets
                    key: ICECAST_SOURCE_PASSWORD
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_1
            securityContext: &radioSecurityContext
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            resources: &radioResources
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi

      radio-2:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env: &env2
              ICECAST_URL: *icecastUrl
              QUALITY: *quality
              ENCODE_MODE: *encodeMode
              BITRATE: *bitrate
              ICECAST_PASS: *icecastPass
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_2

      radio-3:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env:
              <<: *env2
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_3

      radio-4:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env:
              <<: *env2
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_4

      radio-5:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env:
              <<: *env2
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_5

      radio-6:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env:
              <<: *env2
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_6

      radio-7:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env:
              <<: *env2
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_7

      radio-8:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env:
              <<: *env2
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_8

      radio-9:
        <<: *radioController
        containers:
          app:
            <<: *radioContainer
            env:
              <<: *env2
              CHANNEL:
                valueFrom:
                  secretKeyRef:
                    name: twitch-djs
                    key: radio_9
