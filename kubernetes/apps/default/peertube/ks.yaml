---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: peertube
spec:
  dependsOn:
    - name: crunchy-postgres-cluster-clusterexternalsecrets
      namespace: databases
    - name: envoy-gateway
      namespace: network
  path: ./kubernetes/apps/default/peertube/app
  postBuild:
    substitute:
      postgres_cluster_version: "v17-1"
  targetNamespace: default
