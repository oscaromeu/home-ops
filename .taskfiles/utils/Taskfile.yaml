---
version: '3'

vars:
  UTILS_RESOURCES_DIR: '{{.ROOT_DIR}}/.taskfiles/utils/resources'

tasks:

  video2mp3:
    desc: Convert video files to MP3
    summary: |
      Convert video files to MP3 using ffmpeg.
      Supported formats: mov, mp4, mkv, avi, webm, flv, wmv.

      Variables:
        DIR: Directory to process (default: current directory)
        QUALITY: VBR quality 0-9, 0 = best (default: 0)
        OVERWRITE: Overwrite existing files (default: false)
        RECURSIVE: Include subdirectories (default: false)
    cmd: bash {{.UTILS_RESOURCES_DIR}}/video2mp3.sh
    env:
      DIR: '{{.DIR | default "."}}'
      QUALITY: '{{.QUALITY | default "0"}}'
      OVERWRITE: '{{.OVERWRITE | default "false"}}'
      RECURSIVE: '{{.RECURSIVE | default "false"}}'
    preconditions:
      - which ffmpeg

  peertube-upload:
    desc: Upload a video to PeerTube
    summary: |
      Upload a video to a PeerTube instance using the API.
      Requires PT_USER and PT_PASS environment variables.

      Variables:
        FILE: Path to the video file (required)
        NAME: Video title (required)
        INSTANCE: PeerTube instance URL (default: https://peertube.oscaromeu.io)
        CHANNEL_ID: Channel ID to upload to (default: 7)
        PRIVACY: 1 = public, 2 = unlisted, 3 = private (default: 1)
    cmd: bash {{.UTILS_RESOURCES_DIR}}/peertube-upload.sh "{{.FILE}}" "{{.NAME}}"
    env:
      INSTANCE: '{{.INSTANCE | default "https://peertube.oscaromeu.io"}}'
      CHANNEL_ID: '{{.CHANNEL_ID | default "7"}}'
      PRIVACY: '{{.PRIVACY | default "1"}}'
    preconditions:
      - which curl
      - which jq
      - test -n "$PT_USER"
      - test -n "$PT_PASS"

  video2mp4:
    desc: Convert video files to MP4
    summary: |
      Convert video files to MP4 (H.264 + AAC) using ffmpeg.
      Supported formats: mov, mkv, avi, webm, flv, wmv, ts, m4v.

      Variables:
        DIR: Directory to process (default: current directory)
        QUALITY: CRF value 0-51, lower = better (default: 23)
        OVERWRITE: Overwrite existing files (default: false)
        RECURSIVE: Include subdirectories (default: false)
    cmd: bash {{.UTILS_RESOURCES_DIR}}/video2mp4.sh
    env:
      DIR: '{{.DIR | default "."}}'
      QUALITY: '{{.QUALITY | default "23"}}'
      OVERWRITE: '{{.OVERWRITE | default "false"}}'
      RECURSIVE: '{{.RECURSIVE | default "false"}}'
    preconditions:
      - which ffmpeg
