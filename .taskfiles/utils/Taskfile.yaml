---
version: '3'

vars:
  UTILS_RESOURCES_DIR: '{{.ROOT_DIR}}/.taskfiles/utils/resources'

tasks:

  video2audio:
    desc: Extract audio from video files preserving quality
    summary: |
      Extract the audio track from video files using ffmpeg.
      By default (FORMAT=auto) the stream is copied without re-encoding
      into its native container (aac/alac -> m4a, mp3 -> mp3, opus ->
      opus, vorbis -> ogg, flac -> flac, pcm -> wav, ac3/eac3 -> ac3/
      eac3); unknown codecs fall back to MP3 VBR. FORMAT=mp3 forces MP3
      output (still stream-copied when the source is already MP3).

      Variables:
        DIR: Directory to process (default: current directory)
        FORMAT: auto | mp3 (default: auto)
        QUALITY: MP3 VBR quality 0-9, 0 = best (default: 0)
        OVERWRITE: Overwrite existing files (default: false)
        RECURSIVE: Include subdirectories (default: false)
        EXTENSIONS: Space-separated input extensions
          (default: "mov mp4 mkv m4v ts avi flv wmv webm")
    cmd: bash {{.UTILS_RESOURCES_DIR}}/video2audio.sh
    env:
      DIR: '{{.DIR | default "."}}'
      FORMAT: '{{.FORMAT | default "auto"}}'
      QUALITY: '{{.QUALITY | default "0"}}'
      OVERWRITE: '{{.OVERWRITE | default "false"}}'
      RECURSIVE: '{{.RECURSIVE | default "false"}}'
      EXTENSIONS: '{{.EXTENSIONS | default "mov mp4 mkv m4v ts avi flv wmv webm"}}'
    preconditions:
      - which ffmpeg
      - which ffprobe

  remux2mp4:
    desc: Convert video files to MP4 preserving quality
    summary: |
      Convert video files to .mp4 using ffmpeg, preserving quality.
      By default (MODE=auto) it tries a lossless remux (stream copy, no
      re-encoding), then copying video + transcoding audio to AAC, and
      only re-encodes fully (H.264, low CRF) when the codecs are not
      mp4-compatible. Note: with auto/copy the original codec is kept,
      so e.g. a VP9 webm remuxes losslessly but won't play in QuickTime;
      use MODE=encode when player compatibility matters more than quality.

      Variables:
        DIR: Directory to process (default: current directory)
        MODE: auto | copy | encode (default: auto)
        QUALITY: CRF for the encode fallback, lower = better (default: 18)
        OVERWRITE: Overwrite existing files (default: false)
        RECURSIVE: Include subdirectories (default: false)
        EXTENSIONS: Space-separated input extensions
          (default: "mov mkv m4v ts avi flv wmv webm")
    cmd: bash {{.UTILS_RESOURCES_DIR}}/remux2mp4.sh
    env:
      DIR: '{{.DIR | default "."}}'
      MODE: '{{.MODE | default "auto"}}'
      QUALITY: '{{.QUALITY | default "18"}}'
      OVERWRITE: '{{.OVERWRITE | default "false"}}'
      RECURSIVE: '{{.RECURSIVE | default "false"}}'
      EXTENSIONS: '{{.EXTENSIONS | default "mov mkv m4v ts avi flv wmv webm"}}'
    preconditions:
      - which ffmpeg
      - which ffprobe
